<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- Cards -->
  <rect x="30" y="40" width="60" height="75" rx="8" fill="white" stroke="#94a3b8" stroke-width="2"/>
  <rect x="110" y="40" width="60" height="75" rx="8" fill="#818cf8" stroke="#6366f1" stroke-width="2"/>
  <rect x="30" y="125" width="60" height="75" rx="8" fill="#818cf8" stroke="#6366f1" stroke-width="2"/>
  <rect x="110" y="125" width="60" height="75" rx="8" fill="white" stroke="#94a3b8" stroke-width="2"/>
  <!-- Question marks -->
  <text x="140" y="90" font-size="32" text-anchor="middle" fill="white">?</text>
  <text x="60" y="175" font-size="32" text-anchor="middle" fill="white">?</text>
  <!-- Emojis on flipped cards -->
  <text x="60" y="90" font-size="32" text-anchor="middle">🐶</text>
  <text x="140" y="175" font-size="32" text-anchor="middle">🐱</text>
</svg>