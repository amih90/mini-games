<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#F0FDF4"/>
  <!-- Sun -->
  <circle cx="160" cy="40" r="25" fill="#FACC15"/>
  <text x="160" y="48" font-size="24" text-anchor="middle">☀️</text>
  <!-- Pot -->
  <rect x="65" y="140" width="70" height="45" rx="8" fill="#92400E"/>
  <rect x="60" y="135" width="80" height="12" rx="4" fill="#B45309"/>
  <!-- Plant stages (sprout shown) -->
  <rect x="97" y="100" width="6" height="40" rx="3" fill="#22C55E"/>
  <ellipse cx="85" cy="95" rx="15" ry="10" fill="#22C55E" transform="rotate(-30,85,95)"/>
  <ellipse cx="115" cy="95" rx="15" ry="10" fill="#22C55E" transform="rotate(30,115,95)"/>
  <!-- Flower -->
  <circle cx="100" cy="78" r="12" fill="#F472B6"/>
  <circle cx="100" cy="78" r="5" fill="#FACC15"/>
  <!-- Water drops -->
  <text x="30" y="120" font-size="20">💧</text>
  <text x="40" y="145" font-size="14" opacity="0.5">💧</text>
</svg>
