<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#E0F2FE"/>
  <!-- House: triangle roof + square body -->
  <polygon points="100,30 50,90 150,90" fill="#F97316" stroke="#EA580C" stroke-width="2"/>
  <rect x="60" y="90" width="80" height="70" rx="4" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
  <!-- Door -->
  <rect x="85" y="120" width="30" height="40" rx="3" fill="#FACC15"/>
  <!-- Window -->
  <rect x="65" y="100" width="20" height="18" rx="2" fill="#FEF9C3" stroke="#FACC15" stroke-width="1"/>
  <!-- + shapes palette -->
  <circle cx="35" cy="175" r="12" fill="#EF4444" opacity="0.7"/>
  <rect x="60" y="163" width="24" height="24" rx="3" fill="#22C55E" opacity="0.7"/>
  <polygon points="110,163 98,187 122,187" fill="#A855F7" opacity="0.7"/>
  <text x="150" y="182" font-size="20" text-anchor="middle">🏗️</text>
</svg>
