<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tetBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#tetBg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="50" y1="10" x2="50" y2="190"/><line x1="78" y1="10" x2="78" y2="190"/>
    <line x1="106" y1="10" x2="106" y2="190"/><line x1="134" y1="10" x2="134" y2="190"/>
    <line x1="162" y1="10" x2="162" y2="190"/>
    <line x1="22" y1="38" x2="178" y2="38"/><line x1="22" y1="66" x2="178" y2="66"/>
    <line x1="22" y1="94" x2="178" y2="94"/><line x1="22" y1="122" x2="178" y2="122"/>
    <line x1="22" y1="150" x2="178" y2="150"/>
  </g>
  <!-- Locked rows at bottom -->
  <rect x="22" y="152" width="26" height="26" rx="3" fill="#ef4444"/>
  <rect x="50" y="152" width="26" height="26" rx="3" fill="#f97316"/>
  <rect x="78" y="152" width="26" height="26" rx="3" fill="#eab308"/>
  <rect x="106" y="152" width="26" height="26" rx="3" fill="#22c55e"/>
  <rect x="134" y="152" width="26" height="26" rx="3" fill="#3b82f6"/>
  <rect x="162" y="152" width="26" height="26" rx="3" fill="#a855f7"/>
  <rect x="22" y="124" width="26" height="26" rx="3" fill="#f97316"/>
  <rect x="50" y="124" width="26" height="26" rx="3" fill="#22c55e"/>
  <rect x="78" y="124" width="26" height="26" rx="3" fill="#3b82f6"/>
  <rect x="106" y="124" width="26" height="26" rx="3" fill="#ef4444"/>
  <rect x="162" y="124" width="26" height="26" rx="3" fill="#eab308"/>
  <!-- S-piece falling (cyan) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,4;0,0" dur="0.6s" repeatCount="indefinite"/>
    <rect x="78" y="68" width="26" height="26" rx="3" fill="#06b6d4"/>
    <rect x="106" y="68" width="26" height="26" rx="3" fill="#06b6d4"/>
    <rect x="50" y="96" width="26" height="26" rx="3" fill="#06b6d4"/>
    <rect x="78" y="96" width="26" height="26" rx="3" fill="#06b6d4"/>
  </g>
  <!-- T-piece at top -->
  <rect x="50" y="12" width="26" height="26" rx="3" fill="#a855f7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="78" y="12" width="26" height="26" rx="3" fill="#a855f7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="106" y="12" width="26" height="26" rx="3" fill="#a855f7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="78" y="40" width="26" height="26" rx="3" fill="#a855f7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Sparkle on clear -->
  <circle cx="170" cy="138" r="3" fill="#ffd700">
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="142" r="2" fill="#ffd700">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
