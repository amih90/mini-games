<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="paddle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  
  <!-- Bricks -->
  <g>
    <rect x="15" y="25" width="35" height="15" rx="3" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="25" width="35" height="15" rx="3" fill="#ef4444"/>
    <rect x="95" y="25" width="35" height="15" rx="3" fill="#ef4444"/>
    <rect x="135" y="25" width="35" height="15" rx="3" fill="#ef4444">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="15" y="45" width="35" height="15" rx="3" fill="#f97316"/>
    <rect x="55" y="45" width="35" height="15" rx="3" fill="#f97316">
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="95" y="45" width="35" height="15" rx="3" fill="#f97316"/>
    <rect x="135" y="45" width="35" height="15" rx="3" fill="#f97316"/>
    
    <rect x="15" y="65" width="35" height="15" rx="3" fill="#eab308"/>
    <rect x="55" y="65" width="35" height="15" rx="3" fill="#eab308"/>
    <rect x="95" y="65" width="35" height="15" rx="3" fill="#eab308">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="135" y="65" width="35" height="15" rx="3" fill="#eab308"/>
    
    <rect x="15" y="85" width="35" height="15" rx="3" fill="#22c55e"/>
    <rect x="55" y="85" width="35" height="15" rx="3" fill="#22c55e"/>
    <rect x="95" y="85" width="35" height="15" rx="3" fill="#22c55e"/>
    <rect x="135" y="85" width="35" height="15" rx="3" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.8;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Ball -->
  <circle cx="100" cy="130" r="8" fill="white">
    <animate attributeName="cy" values="130;115;130" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;120;100" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Ball glow -->
  <circle cx="100" cy="130" r="12" fill="white" opacity="0.3">
    <animate attributeName="cy" values="130;115;130" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;120;100" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Paddle -->
  <rect x="60" y="165" width="80" height="12" rx="6" fill="url(#paddle)">
    <animate attributeName="x" values="60;70;60" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Sparkles -->
  <circle cx="30" cy="120" r="2" fill="#ffd700">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="110" r="2" fill="#ffd700">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="140" r="1.5" fill="#ffd700">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>
