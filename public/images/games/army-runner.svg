<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="arSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="arRoad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="200" height="200" rx="20" fill="url(#arSky)"/>
  <!-- Road in perspective -->
  <polygon points="100,110 0,200 200,200" fill="url(#arRoad)"/>
  <line x1="100" y1="110" x2="100" y2="200" stroke="#fbbf24" stroke-width="3" stroke-dasharray="8,6" opacity="0.7"/>
  <!-- Gate 1 (green = correct) -->
  <rect x="30" y="115" width="40" height="45" rx="4" fill="#16a34a" stroke="#22c55e" stroke-width="2" opacity="0.9"/>
  <text x="50" y="148" font-size="28" text-anchor="middle">+</text>
  <rect x="28" y="113" width="44" height="8" rx="2" fill="#22c55e"/>
  <!-- Gate poles -->
  <rect x="30" y="113" width="4" height="52" rx="2" fill="#15803d"/>
  <rect x="66" y="113" width="4" height="52" rx="2" fill="#15803d"/>
  <!-- Gate 2 (red = wrong) -->
  <rect x="130" y="115" width="40" height="45" rx="4" fill="#dc2626" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
  <text x="150" y="148" font-size="24" text-anchor="middle">✕</text>
  <rect x="128" y="113" width="44" height="8" rx="2" fill="#ef4444"/>
  <rect x="130" y="113" width="4" height="52" rx="2" fill="#b91c1c"/>
  <rect x="166" y="113" width="4" height="52" rx="2" fill="#b91c1c"/>
  <!-- Soldiers running (heading to green gate) -->
  <!-- Soldier 1 -->
  <g>
    <animate attributeName="transform" type="translate" values="0,0;2,-1;0,0" dur="0.4s" repeatCount="indefinite"/>
    <circle cx="80" cy="88" r="7" fill="#fde68a"/>
    <rect x="75" y="96" width="10" height="14" rx="2" fill="#4b5563"/>
    <line x1="72" y1="100" x2="68" y2="108" stroke="#4b5563" stroke-width="2.5"/>
    <line x1="88" y1="100" x2="92" y2="108" stroke="#4b5563" stroke-width="2.5"/>
    <line x1="79" y1="110" x2="76" y2="120" stroke="#374151" stroke-width="2.5"/>
    <line x1="81" y1="110" x2="84" y2="120" stroke="#374151" stroke-width="2.5"/>
    <rect x="74" y="82" width="12" height="5" rx="1" fill="#4b5563"/>
  </g>
  <!-- Soldier 2 -->
  <g>
    <animate attributeName="transform" type="translate" values="0,0;-2,-1;0,0" dur="0.4s" begin="0.2s" repeatCount="indefinite"/>
    <circle cx="100" cy="85" r="7" fill="#fde68a"/>
    <rect x="95" y="93" width="10" height="14" rx="2" fill="#374151"/>
    <line x1="92" y1="97" x2="88" y2="105" stroke="#374151" stroke-width="2.5"/>
    <line x1="108" y1="97" x2="112" y2="105" stroke="#374151" stroke-width="2.5"/>
    <line x1="99" y1="107" x2="96" y2="117" stroke="#374151" stroke-width="2.5"/>
    <line x1="101" y1="107" x2="104" y2="117" stroke="#374151" stroke-width="2.5"/>
    <rect x="94" y="79" width="12" height="5" rx="1" fill="#374151"/>
  </g>
  <!-- Stars in sky -->
  <circle cx="25" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="160" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="185" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="140" cy="60" r="1" fill="white" opacity="0.5"/>
  <text x="87" y="40" font-size="16">🌙</text>
  <!-- Score indicator -->
  <rect x="75" y="12" width="50" height="20" rx="5" fill="rgba(0,0,0,0.4)"/>
  <text x="100" y="26" font-size="12" fill="white" text-anchor="middle" font-weight="bold">SCORE: 5</text>
</svg>
