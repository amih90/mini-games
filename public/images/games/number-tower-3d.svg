<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ntBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#ntBg)"/>
  <!-- Grid floor effect -->
  <line x1="0" y1="66" x2="200" y2="66" stroke="rgba(255,255,255,0.04)"/>
  <line x1="0" y1="133" x2="200" y2="133" stroke="rgba(255,255,255,0.04)"/>

  <!-- Shadow under tower -->
  <ellipse cx="100" cy="188" rx="45" ry="8" fill="rgba(0,0,0,0.4)"/>

  <!-- Block 5 (bottom, widest) - red -->
  <rect x="55" y="148" width="90" height="30" rx="6" fill="#ef4444"/>
  <rect x="55" y="148" width="90" height="10" rx="6" fill="#fca5a5"/>
  <rect x="55" y="153" width="3" height="25" rx="1" fill="#b91c1c" opacity="0.6"/>
  <rect x="142" y="153" width="3" height="25" rx="1" fill="#b91c1c" opacity="0.6"/>
  <text x="100" y="169" font-size="16" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">5</text>

  <!-- Block 4 - orange -->
  <rect x="63" y="118" width="74" height="28" rx="6" fill="#f97316"/>
  <rect x="63" y="118" width="74" height="9" rx="6" fill="#fdba74"/>
  <rect x="63" y="123" width="3" height="23" rx="1" fill="#c2410c" opacity="0.6"/>
  <rect x="134" y="123" width="3" height="23" rx="1" fill="#c2410c" opacity="0.6"/>
  <text x="100" y="138" font-size="15" font-weight="bold" fill="white" text-anchor="middle">4</text>

  <!-- Block 3 - yellow -->
  <rect x="72" y="91" width="56" height="25" rx="5" fill="#eab308"/>
  <rect x="72" y="91" width="56" height="8" rx="5" fill="#fde047"/>
  <text x="100" y="109" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>

  <!-- Block 2 - green -->
  <rect x="80" y="67" width="40" height="22" rx="4" fill="#22c55e"/>
  <rect x="80" y="67" width="40" height="7" rx="4" fill="#86efac"/>
  <text x="100" y="83" font-size="13" font-weight="bold" fill="white" text-anchor="middle">2</text>

  <!-- Block 1 (top, smallest) - blue -->
  <rect x="87" y="47" width="26" height="18" rx="4" fill="#3b82f6"/>
  <rect x="87" y="47" width="26" height="6" rx="4" fill="#93c5fd"/>
  <text x="100" y="61" font-size="11" font-weight="bold" fill="white" text-anchor="middle">1</text>

  <!-- Falling block -->
  <rect x="120" y="15" width="26" height="18" rx="4" fill="#a855f7" opacity="0.85">
    <animate attributeName="y" values="15;38;15" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="133" y="28" font-size="11" font-weight="bold" fill="white" text-anchor="middle">
    <animate attributeName="y" values="28;51;28" dur="1.5s" repeatCount="indefinite"/>
    6
  </text>

  <!-- Stars -->
  <circle cx="25" cy="30" r="1.5" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="175" cy="20" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="185" cy="170" r="1.5" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.7s" repeatCount="indefinite"/>
  </circle>
</svg>
