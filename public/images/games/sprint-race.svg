<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="trackBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="50%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#trackBg)"/>
  
  <!-- Sky area -->
  <rect x="0" y="0" width="200" height="50" rx="20 20 0 0" fill="#87ceeb"/>
  
  <!-- Crowd dots -->
  <g fill="#666">
    <circle cx="20" cy="25" r="3"/>
    <circle cx="35" cy="30" r="3"/>
    <circle cx="50" cy="22" r="3"/>
    <circle cx="65" cy="28" r="3"/>
    <circle cx="80" cy="24" r="3"/>
    <circle cx="95" cy="30" r="3"/>
    <circle cx="110" cy="22" r="3"/>
    <circle cx="125" cy="27" r="3"/>
    <circle cx="140" cy="24" r="3"/>
    <circle cx="155" cy="29" r="3"/>
    <circle cx="170" cy="23" r="3"/>
    <circle cx="185" cy="28" r="3"/>
  </g>
  
  <!-- Track -->
  <rect x="0" y="50" width="200" height="100" fill="#d32f2f"/>
  
  <!-- Lane lines -->
  <g stroke="#fff" stroke-width="2">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="75" x2="200" y2="75"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="125" x2="200" y2="125"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
  </g>
  
  <!-- Finish line pattern -->
  <g fill="#fff">
    <rect x="175" y="50" width="8" height="8"/>
    <rect x="183" y="58" width="8" height="8"/>
    <rect x="175" y="66" width="8" height="8"/>
    <rect x="183" y="74" width="8" height="8"/>
    <rect x="175" y="82" width="8" height="8"/>
    <rect x="183" y="90" width="8" height="8"/>
    <rect x="175" y="98" width="8" height="8"/>
    <rect x="183" y="106" width="8" height="8"/>
    <rect x="175" y="114" width="8" height="8"/>
    <rect x="183" y="122" width="8" height="8"/>
    <rect x="175" y="130" width="8" height="8"/>
    <rect x="183" y="138" width="8" height="8"/>
    <rect x="175" y="146" width="8" height="8"/>
  </g>
  <g fill="#000">
    <rect x="183" y="50" width="8" height="8"/>
    <rect x="175" y="58" width="8" height="8"/>
    <rect x="183" y="66" width="8" height="8"/>
    <rect x="175" y="74" width="8" height="8"/>
    <rect x="183" y="82" width="8" height="8"/>
    <rect x="175" y="90" width="8" height="8"/>
    <rect x="183" y="98" width="8" height="8"/>
    <rect x="175" y="106" width="8" height="8"/>
    <rect x="183" y="114" width="8" height="8"/>
    <rect x="175" y="122" width="8" height="8"/>
    <rect x="183" y="130" width="8" height="8"/>
    <rect x="175" y="138" width="8" height="8"/>
    <rect x="183" y="146" width="8" height="8"/>
  </g>
  
  <!-- Runners -->
  <!-- Runner 1 (player - green) -->
  <g transform="translate(120, 55)">
    <rect x="5" y="8" width="12" height="15" rx="3" fill="#4caf50"/>
    <circle cx="11" cy="5" r="5" fill="#ffcc80"/>
    <rect x="7" y="20" width="3" height="8" fill="#4caf50">
      <animate attributeName="height" values="8;12;8" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="20" width="3" height="8" fill="#4caf50">
      <animate attributeName="height" values="12;8;12" dur="0.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Runner 2 (red) -->
  <g transform="translate(90, 80)">
    <rect x="5" y="8" width="12" height="15" rx="3" fill="#f44336"/>
    <circle cx="11" cy="5" r="5" fill="#ffcc80"/>
    <rect x="7" y="20" width="3" height="8" fill="#f44336"/>
    <rect x="12" y="20" width="3" height="8" fill="#f44336"/>
  </g>
  
  <!-- Runner 3 (purple) -->
  <g transform="translate(70, 105)">
    <rect x="5" y="8" width="12" height="15" rx="3" fill="#9c27b0"/>
    <circle cx="11" cy="5" r="5" fill="#ffcc80"/>
    <rect x="7" y="20" width="3" height="8" fill="#9c27b0"/>
    <rect x="12" y="20" width="3" height="8" fill="#9c27b0"/>
  </g>
  
  <!-- Runner 4 (orange) -->
  <g transform="translate(100, 130)">
    <rect x="5" y="8" width="12" height="15" rx="3" fill="#ff9800"/>
    <circle cx="11" cy="5" r="5" fill="#ffcc80"/>
    <rect x="7" y="20" width="3" height="8" fill="#ff9800"/>
    <rect x="12" y="20" width="3" height="8" fill="#ff9800"/>
  </g>
  
  <!-- Grass -->
  <rect x="0" y="150" width="200" height="50" rx="0 0 20 20" fill="#4caf50"/>
  
  <!-- Decorative -->
  <text x="15" y="175" font-size="20">🏃</text>
  <text x="150" y="175" font-size="16">🏅</text>
  <text x="170" y="30" font-size="14" fill="#fbbf24">⭐</text>
</svg>
