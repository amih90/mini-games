<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#065f46"/>
  <!-- Table surface -->
  <rect x="30" y="50" width="140" height="100" rx="6" fill="#059669" stroke="#34d399" stroke-width="2"/>
  <!-- Net -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="white" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Center line -->
  <line x1="100" y1="50" x2="100" y2="150" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- Player paddle -->
  <rect x="75" y="135" width="50" height="8" rx="4" fill="#3b82f6"/>
  <!-- AI paddle -->
  <rect x="80" y="57" width="40" height="8" rx="4" fill="#ef4444"/>
  <!-- Ball -->
  <circle cx="110" cy="95" r="8" fill="#fbbf24"/>
  <circle cx="108" cy="93" r="3" fill="#fef3c7" opacity="0.7"/>
  <!-- 3D text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#fbbf24">3D</text>
  <!-- Decorative stars -->
  <text x="25" y="35" font-size="16">🏓</text>
  <text x="160" y="35" font-size="16">⭐</text>
</svg>
