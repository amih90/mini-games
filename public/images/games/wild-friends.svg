<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="wfSky" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
  </defs>
  <!-- Sky background -->
  <rect width="200" height="200" rx="20" fill="url(#wfSky)"/>
  <!-- Clouds -->
  <ellipse cx="35" cy="30" rx="22" ry="10" fill="white" opacity="0.6"/>
  <ellipse cx="160" cy="20" rx="18" ry="8" fill="white" opacity="0.5"/>
  <!-- World globe outline -->
  <circle cx="100" cy="115" r="72" fill="#166534" stroke="#15803d" stroke-width="2"/>
  <!-- Ocean -->
  <circle cx="100" cy="115" r="72" fill="#0c4a6e" opacity="0.6"/>
  <!-- Continents (simplified) -->
  <!-- Americas -->
  <ellipse cx="65" cy="105" rx="18" ry="28" fill="#16a34a" opacity="0.9"/>
  <!-- Europe/Africa -->
  <ellipse cx="108" cy="115" rx="14" ry="32" fill="#16a34a" opacity="0.9"/>
  <!-- Asia -->
  <ellipse cx="145" cy="100" rx="20" ry="22" fill="#16a34a" opacity="0.85"/>
  <!-- Australia -->
  <ellipse cx="148" cy="138" rx="12" ry="9" fill="#16a34a" opacity="0.8"/>
  <!-- Globe equator/meridian lines -->
  <ellipse cx="100" cy="115" rx="72" ry="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="43" x2="100" y2="187" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Globe border glow -->
  <circle cx="100" cy="115" r="72" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>

  <!-- Kiwi parrot (top center, prominent) -->
  <text x="85" y="45" font-size="36">🦜</text>

  <!-- Animal emojis on continents -->
  <text x="55" y="110" font-size="18">🦁</text>   <!-- Africa: lion -->
  <text x="100" y="130" font-size="16">🐘</text>  <!-- Asia: elephant -->
  <text x="50" y="138" font-size="16">🐻</text>   <!-- Americas: bear -->
  <text x="138" y="105" font-size="15">🐯</text>  <!-- Asia: tiger -->
  <text x="138" y="148" font-size="13">🦘</text>  <!-- Australia: kangaroo -->
</svg>
