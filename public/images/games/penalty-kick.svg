<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#skyGrad)"/>
  
  <!-- Grass -->
  <rect x="0" y="140" width="200" height="60" rx="0 0 20 20" fill="url(#grassGrad)"/>
  
  <!-- Goal posts -->
  <rect x="30" y="40" width="6" height="80" fill="#fff"/>
  <rect x="164" y="40" width="6" height="80" fill="#fff"/>
  <rect x="30" y="34" width="140" height="8" fill="#fff"/>
  
  <!-- Net pattern -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
    <line x1="50" y1="40" x2="50" y2="120"/>
    <line x1="70" y1="40" x2="70" y2="120"/>
    <line x1="90" y1="40" x2="90" y2="120"/>
    <line x1="110" y1="40" x2="110" y2="120"/>
    <line x1="130" y1="40" x2="130" y2="120"/>
    <line x1="150" y1="40" x2="150" y2="120"/>
    <line x1="36" y1="60" x2="164" y2="60"/>
    <line x1="36" y1="80" x2="164" y2="80"/>
    <line x1="36" y1="100" x2="164" y2="100"/>
  </g>
  
  <!-- Goalkeeper -->
  <rect x="85" y="55" width="30" height="50" rx="5" fill="#ff9800"/>
  <circle cx="100" cy="50" r="10" fill="#ffcc80"/>
  <circle cx="75" cy="70" r="6" fill="#4caf50"/>
  <circle cx="125" cy="70" r="6" fill="#4caf50"/>
  
  <!-- Ball -->
  <circle cx="100" cy="160" r="18" fill="#fff" stroke="#333" stroke-width="2">
    <animate attributeName="cy" values="160;150;160" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="95" cy="156" r="5" fill="#333"/>
  <circle cx="108" cy="162" r="5" fill="#333"/>
  
  <!-- Aim crosshair -->
  <g stroke="#ff5722" stroke-width="2" opacity="0.8">
    <circle cx="100" cy="80" r="15" fill="none">
      <animate attributeName="r" values="15;18;15" dur="1s" repeatCount="indefinite"/>
    </circle>
    <line x1="85" y1="80" x2="115" y2="80"/>
    <line x1="100" y1="65" x2="100" y2="95"/>
  </g>
  
  <!-- Decorative -->
  <text x="25" y="175" font-size="20">⚽</text>
  <text x="160" y="30" font-size="16" fill="#fbbf24">✨</text>
</svg>
