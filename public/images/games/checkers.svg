<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg-checkers" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-checkers)"/>
  <!-- Checkerboard -->
  <rect x="40" y="40" width="120" height="120" fill="#92400e" rx="4"/>
  <rect x="40" y="40" width="30" height="30" fill="#d97706"/>
  <rect x="70" y="70" width="30" height="30" fill="#d97706"/>
  <rect x="100" y="40" width="30" height="30" fill="#d97706"/>
  <rect x="130" y="70" width="30" height="30" fill="#d97706"/>
  <rect x="40" y="100" width="30" height="30" fill="#d97706"/>
  <rect x="70" y="130" width="30" height="30" fill="#d97706"/>
  <rect x="100" y="100" width="30" height="30" fill="#d97706"/>
  <rect x="130" y="130" width="30" height="30" fill="#d97706"/>
  <!-- Red checker -->
  <circle cx="85" cy="55" r="12" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <!-- Black checker -->
  <circle cx="115" cy="145" r="12" fill="#1f2937" stroke="#111827" stroke-width="2"/>
</svg>
