<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="snakeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a2f"/>
      <stop offset="100%" stop-color="#0d1f17"/>
    </linearGradient>
    <linearGradient id="snakeBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#snakeBg)"/>
  
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
  </g>
  
  <!-- Snake body segments -->
  <rect x="30" y="90" width="28" height="28" rx="5" fill="#16a34a"/>
  <rect x="58" y="90" width="28" height="28" rx="5" fill="#1d9e4e"/>
  <rect x="86" y="90" width="28" height="28" rx="5" fill="#20a854"/>
  <rect x="114" y="90" width="28" height="28" rx="5" fill="#22b25a"/>
  
  <!-- Snake head -->
  <rect x="142" y="88" width="32" height="32" rx="7" fill="url(#snakeBody)">
    <animate attributeName="x" values="142;145;142" dur="0.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Snake eyes -->
  <circle cx="163" cy="98" r="5" fill="white"/>
  <circle cx="163" cy="110" r="5" fill="white"/>
  <circle cx="164" cy="98" r="2.5" fill="#1a1a2e"/>
  <circle cx="164" cy="110" r="2.5" fill="#1a1a2e"/>
  
  <!-- Apple -->
  <circle cx="60" cy="140" r="14" fill="#ef4444">
    <animate attributeName="r" values="14;15;14" dur="1s" repeatCount="indefinite"/>
  </circle>
  <rect x="58" y="122" width="4" height="8" rx="1" fill="#78350f"/>
  <ellipse cx="66" cy="126" rx="5" ry="3" fill="#22c55e" transform="rotate(30 66 126)"/>
  
  <!-- Apple highlight -->
  <circle cx="55" cy="135" r="4" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Decorative sparkles -->
  <text x="150" y="50" font-size="20" fill="#fbbf24">✨</text>
  <text x="35" y="60" font-size="16" fill="#fbbf24" opacity="0.7">⭐</text>
</svg>
