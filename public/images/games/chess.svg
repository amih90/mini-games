<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg-chess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-chess)"/>
  <!-- Chess board -->
  <rect x="40" y="40" width="120" height="120" fill="#78716c" rx="4"/>
  <rect x="40" y="40" width="30" height="30" fill="#fef3c7"/>
  <rect x="70" y="70" width="30" height="30" fill="#fef3c7"/>
  <rect x="100" y="40" width="30" height="30" fill="#fef3c7"/>
  <rect x="130" y="70" width="30" height="30" fill="#fef3c7"/>
  <rect x="40" y="100" width="30" height="30" fill="#fef3c7"/>
  <rect x="70" y="130" width="30" height="30" fill="#fef3c7"/>
  <rect x="100" y="100" width="30" height="30" fill="#fef3c7"/>
  <rect x="130" y="130" width="30" height="30" fill="#fef3c7"/>
  <!-- Chess pieces (Unicode symbols) -->
  <text x="55" y="65" font-size="24" text-anchor="middle" fill="white">♔</text>
  <text x="145" y="65" font-size="24" text-anchor="middle" fill="white">♕</text>
  <text x="55" y="155" font-size="24" text-anchor="middle" fill="#1f2937">♚</text>
  <text x="145" y="155" font-size="24" text-anchor="middle" fill="#1f2937">♜</text>
</svg>
