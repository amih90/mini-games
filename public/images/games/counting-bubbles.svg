<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cbOcean" cx="50%" cy="80%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </radialGradient>
    <radialGradient id="b1" cx="35%" cy="35%"><stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.8"/><stop offset="100%" stop-color="#ec4899" stop-opacity="0.5"/></radialGradient>
    <radialGradient id="b2" cx="35%" cy="35%"><stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.8"/><stop offset="100%" stop-color="#0891b2" stop-opacity="0.5"/></radialGradient>
    <radialGradient id="b3" cx="35%" cy="35%"><stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.8"/><stop offset="100%" stop-color="#16a34a" stop-opacity="0.5"/></radialGradient>
    <radialGradient id="b4" cx="35%" cy="35%"><stop offset="0%" stop-color="#fde68a" stop-opacity="0.8"/><stop offset="100%" stop-color="#d97706" stop-opacity="0.5"/></radialGradient>
    <radialGradient id="b5" cx="35%" cy="35%"><stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.8"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/></radialGradient>
  </defs>
  <!-- Ocean BG -->
  <rect width="200" height="200" rx="20" fill="url(#cbOcean)"/>
  <!-- Subtle grid -->
  <line x1="0" y1="66" x2="200" y2="66" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="133" x2="200" y2="133" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Bubble 1 (pink, "3") -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2.5s" repeatCount="indefinite"/>
    <circle cx="45" cy="100" r="32" fill="url(#b1)" stroke="#f9a8d4" stroke-width="1.5"/>
    <text x="45" y="108" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">3</text>
  </g>
  <!-- Bubble 2 (cyan, "7") -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <circle cx="130" cy="75" r="28" fill="url(#b2)" stroke="#a5f3fc" stroke-width="1.5"/>
    <text x="130" y="83" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">7</text>
  </g>
  <!-- Bubble 3 (green, "5") small -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3s" begin="1s" repeatCount="indefinite"/>
    <circle cx="85" cy="155" r="22" fill="url(#b3)" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="85" y="162" font-size="20" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">5</text>
  </g>
  <!-- Bubble 4 (yellow, "2") -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <circle cx="165" cy="140" r="24" fill="url(#b4)" stroke="#fde68a" stroke-width="1.5"/>
    <text x="165" y="148" font-size="22" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">2</text>
  </g>
  <!-- Bubble 5 (purple, "9") small -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    <circle cx="168" cy="40" r="20" fill="url(#b5)" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="168" y="47" font-size="18" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">9</text>
  </g>
  <!-- Tiny sparkle bubbles -->
  <circle cx="20" cy="150" r="5" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="0.5">
    <animate attributeName="cy" values="150;140;150" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="110" r="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="0.5">
    <animate attributeName="cy" values="110;100;110" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
