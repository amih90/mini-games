<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="ssSpace" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>
  <!-- Deep space -->
  <rect width="200" height="200" rx="20" fill="url(#ssSpace)"/>
  <!-- Stars -->
  <circle cx="15" cy="15" r="1.2" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="185" cy="20" r="1" fill="white" opacity="0.7"/>
  <circle cx="30" cy="60" r="1.5" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="170" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="190" cy="90" r="1" fill="white" opacity="0.5"/>
  <circle cx="10" cy="140" r="1.5" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="10" r="1" fill="white" opacity="0.6"/>
  <circle cx="165" cy="130" r="1.2" fill="white" opacity="0.4"/>
  <!-- Orbital rings (ellipses for 3D perspective) -->
  <ellipse cx="100" cy="100" rx="25" ry="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <ellipse cx="100" cy="100" rx="42" ry="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <ellipse cx="100" cy="100" rx="62" ry="21" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <ellipse cx="100" cy="100" rx="82" ry="28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Sun (center) -->
  <circle cx="100" cy="100" r="22" fill="url(#sun)"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#fde68a" stroke-width="1.5">
    <animate attributeName="r" values="22;24;22" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Mercury (closest) -->
  <circle cx="125" cy="100" r="4" fill="#9ca3af">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Venus -->
  <circle cx="142" cy="100" r="5.5" fill="#fcd34d">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Earth (blue) -->
  <circle cx="162" cy="100" r="6.5" fill="#3b82f6">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="7s" repeatCount="indefinite"/>
  </circle>
  <!-- Moon of Earth -->
  <circle cx="170" cy="94" r="2.5" fill="#d1d5db" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="7s" repeatCount="indefinite"/>
  </circle>
  <!-- Mars (red) -->
  <circle cx="182" cy="100" r="5" fill="#ef4444">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="11s" repeatCount="indefinite"/>
  </circle>
</svg>
