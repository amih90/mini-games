<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#EDE9FE"/>
  <!-- Mirror line -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#A855F7" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Left side (filled) -->
  <rect x="30" y="60" width="25" height="25" rx="3" fill="#3B82F6"/>
  <rect x="55" y="60" width="25" height="25" rx="3" fill="#EF4444"/>
  <rect x="30" y="85" width="25" height="25" rx="3" fill="#22C55E"/>
  <rect x="55" y="85" width="25" height="25" rx="3" fill="#FACC15"/>
  <rect x="30" y="110" width="25" height="25" rx="3" fill="#EF4444"/>
  <rect x="55" y="110" width="25" height="25" rx="3" fill="#3B82F6"/>
  <!-- Right side (partially filled - the mirror) -->
  <rect x="120" y="60" width="25" height="25" rx="3" fill="#EF4444"/>
  <rect x="145" y="60" width="25" height="25" rx="3" fill="#3B82F6"/>
  <rect x="120" y="85" width="25" height="25" rx="3" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="145" y="85" width="25" height="25" rx="3" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="120" y="110" width="25" height="25" rx="3" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="145" y="110" width="25" height="25" rx="3" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Labels -->
  <text x="50" y="155" font-size="10" text-anchor="middle" fill="#6B7280">Original</text>
  <text x="150" y="155" font-size="10" text-anchor="middle" fill="#6B7280">Mirror</text>
  <text x="100" y="25" font-size="18" text-anchor="middle">🪞</text>
</svg>
