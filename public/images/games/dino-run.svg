<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F7FA"/>
    </linearGradient>
  </defs>
  
  <!-- Background sky -->
  <rect width="200" height="200" fill="url(#sky)" rx="20"/>
  
  <!-- Clouds -->
  <g opacity="0.8">
    <circle cx="40" cy="40" r="15" fill="white">
      <animate attributeName="cx" values="40;50;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="35" r="12" fill="white">
      <animate attributeName="cx" values="55;65;55" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="40" r="15" fill="white">
      <animate attributeName="cx" values="70;80;70" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="140" cy="55" r="12" fill="white">
      <animate attributeName="cx" values="140;130;140" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="50" r="10" fill="white">
      <animate attributeName="cx" values="155;145;155" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="150" width="200" height="50" fill="#8B4513" rx="0 0 20 20"/>
  <rect x="0" y="150" width="200" height="5" fill="#228B22"/>
  
  <!-- Dino -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="0.6s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <rect x="50" y="105" width="30" height="40" rx="8" fill="#22c55e"/>
    
    <!-- Head -->
    <rect x="65" y="90" width="25" height="22" rx="6" fill="#16a34a"/>
    
    <!-- Eye -->
    <circle cx="80" cy="98" r="5" fill="white"/>
    <circle cx="81" cy="98" r="2.5" fill="black"/>
    
    <!-- Legs -->
    <rect x="55" y="140" width="8" height="12" rx="2" fill="#16a34a">
      <animate attributeName="height" values="12;8;12" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="140" width="8" height="12" rx="2" fill="#16a34a">
      <animate attributeName="height" values="8;12;8" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Tail -->
    <polygon points="50,110 35,105 40,120" fill="#16a34a"/>
  </g>
  
  <!-- Cactus -->
  <g>
    <rect x="140" y="115" width="15" height="40" rx="3" fill="#228B22"/>
    <rect x="132" y="130" width="10" height="8" rx="2" fill="#228B22"/>
    <rect x="153" y="125" width="10" height="8" rx="2" fill="#228B22"/>
  </g>
  
  <!-- Flying pterodactyl -->
  <g>
    <animate attributeName="opacity" values="1;1;1" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,5;0,0" dur="2s" repeatCount="indefinite"/>
    
    <ellipse cx="170" cy="85" rx="12" ry="6" fill="#6366f1"/>
    <circle cx="180" cy="82" r="5" fill="#6366f1"/>
    <polygon points="165,85 155,70 175,70" fill="#818cf8">
      <animateTransform attributeName="transform" type="rotate" values="0 165 85;-15 165 85;0 165 85" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Beak -->
    <polygon points="185,82 192,84 185,86" fill="#f97316"/>
  </g>
  
  <!-- Ground details -->
  <circle cx="20" cy="165" r="3" fill="#654321"/>
  <circle cx="80" cy="170" r="2" fill="#654321"/>
  <circle cx="120" cy="168" r="2.5" fill="#654321"/>
  <circle cx="180" cy="165" r="2" fill="#654321"/>
</svg>
