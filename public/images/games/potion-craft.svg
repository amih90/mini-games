<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="pcBg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="cauldronGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#pcBg)"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="185" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="170" cy="50" r="1.5" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="15" cy="70" r="1" fill="white" opacity="0.5"/>

  <!-- Ingredient vials (top) -->
  <!-- Vial red -->
  <rect x="22" y="35" width="16" height="35" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="22" y="47" width="16" height="23" rx="4" fill="#ef4444" opacity="0.8"/>
  <rect x="25" y="33" width="10" height="5" rx="2" fill="#9ca3af"/>
  <text x="30" y="80" font-size="8" fill="#ef4444" text-anchor="middle">🔴</text>
  <!-- Vial blue -->
  <rect x="46" y="30" width="16" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="46" y="45" width="16" height="23" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="49" y="28" width="10" height="5" rx="2" fill="#9ca3af"/>
  <text x="54" y="75" font-size="8" fill="#60a5fa" text-anchor="middle">🔵</text>
  <!-- Vial green -->
  <rect x="70" y="37" width="16" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="70" y="49" width="16" height="20" rx="4" fill="#22c55e" opacity="0.8"/>
  <rect x="73" y="35" width="10" height="5" rx="2" fill="#9ca3af"/>

  <!-- Cauldron body -->
  <ellipse cx="120" cy="145" rx="48" ry="30" fill="#111827"/>
  <path d="M72,135 Q80,170 120,175 Q160,170 168,135" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <!-- Cauldron legs -->
  <rect x="92" y="170" width="8" height="20" rx="2" fill="#374151"/>
  <rect x="140" y="170" width="8" height="20" rx="2" fill="#374151"/>
  <!-- Cauldron handle -->
  <path d="M85,138 Q85,120 120,120 Q155,120 155,138" fill="none" stroke="#4b5563" stroke-width="4"/>
  <!-- Liquid inside -->
  <ellipse cx="120" cy="140" rx="42" ry="22" fill="#059669"/>
  <ellipse cx="120" cy="138" rx="38" ry="18" fill="#10b981">
    <animate attributeName="ry" values="18;20;18" dur="0.8s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Glow -->
  <ellipse cx="120" cy="135" rx="45" ry="20" fill="url(#cauldronGlow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Bubbles rising from cauldron -->
  <circle cx="105" cy="130" r="4" fill="#34d399" opacity="0.7">
    <animate attributeName="cy" values="130;90;80" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.5;0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="128" r="5" fill="#6ee7b7" opacity="0.6">
    <animate attributeName="cy" values="128;85;75" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="118" cy="133" r="3" fill="#a7f3d0" opacity="0.5">
    <animate attributeName="cy" values="133;100;90" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Magic sparkles -->
  <text x="155" y="110" font-size="14">✨</text>
  <text x="80" y="100" font-size="12">⭐</text>
</svg>
