<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ssBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#ssBg)"/>

  <!-- Platform / sorter board -->
  <rect x="20" y="140" width="160" height="40" rx="8" fill="#374151"/>
  <rect x="20" y="140" width="160" height="12" rx="8" fill="#4b5563"/>
  <!-- 3D illusion for platform -->
  <rect x="22" y="178" width="156" height="8" rx="4" fill="#1f2937"/>

  <!-- Hole 1 (circle) -->
  <ellipse cx="55" cy="150" rx="18" ry="8" fill="#111827"/>
  <ellipse cx="55" cy="150" rx="16" ry="6" fill="#0f172a"/>
  <ellipse cx="55" cy="150" rx="16" ry="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Hole 2 (square) -->
  <rect x="85" y="143" width="30" height="15" rx="2" fill="#111827"/>
  <rect x="87" y="145" width="26" height="11" rx="1" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Hole 3 (triangle) -->
  <polygon points="155,143 175,163 135,163" fill="#111827"/>
  <polygon points="155,145 173,162 137,162" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>

  <!-- Falling sphere (purple/indigo) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,80;0,0" dur="2s" repeatCount="indefinite"/>
    <circle cx="55" cy="75" r="16" fill="#6366f1"/>
    <circle cx="55" cy="75" r="16" fill="none" stroke="#818cf8" stroke-width="2"/>
    <ellipse cx="50" cy="70" rx="6" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-30,50,70)"/>
  </g>

  <!-- Cube (green) - already in hole or above -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,65;0,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <!-- Cube front -->
    <rect x="88" y="68" width="24" height="24" rx="3" fill="#22c55e"/>
    <!-- Cube top -->
    <polygon points="88,68 100,58 112,68 100,78" fill="#4ade80" opacity="0.9"/>
    <!-- Cube right -->
    <polygon points="112,68 112,92 100,82 100,72" fill="#16a34a" opacity="0.8"/>
  </g>

  <!-- Triangle (orange) - static above -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,60;0,0" dur="2s" begin="1s" repeatCount="indefinite"/>
    <polygon points="155,50 175,90 135,90" fill="#f97316"/>
    <polygon points="155,50 175,90 135,90" fill="none" stroke="#fed7aa" stroke-width="2"/>
    <!-- Sheen -->
    <polygon points="155,50 165,70 145,70" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Sparkle when shape hits hole -->
  <text x="40" y="25" font-size="14">⭐</text>
  <circle cx="180" cy="40" r="2" fill="#fbbf24"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/></circle>
</svg>
