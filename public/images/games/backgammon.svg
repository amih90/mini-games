      <stop offset="0%" style="stop-color:#fed7aa"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-backgammon)"/>
  <!-- Board -->
  <rect x="30" y="50" width="140" height="100" fill="#78350f" rx="4"/>
  <!-- Points (triangles) -->
  <polygon points="40,60 50,60 45,85" fill="#fef3c7"/>
  <polygon points="60,60 70,60 65,85" fill="#92400e"/>
  <polygon points="80,60 90,60 85,85" fill="#fef3c7"/>
  <polygon points="100,60 110,60 105,85" fill="#92400e"/>
  <polygon points="120,60 130,60 125,85" fill="#fef3c7"/>
  <polygon points="140,60 150,60 145,85" fill="#92400e"/>
  <polygon points="40,140 50,140 45,115" fill="#92400e"/>
  <polygon points="60,140 70,140 65,115" fill="#fef3c7"/>
  <polygon points="80,140 90,140 85,115" fill="#92400e"/>
  <polygon points="100,140 110,140 105,115" fill="#fef3c7"/>
  <polygon points="120,140 130,140 125,115" fill="#92400e"/>
  <polygon points="140,140 150,140 145,115" fill="#fef3c7"/>
  <!-- Checkers -->
  <circle cx="45" cy="75" r="8" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="65" cy="125" r="8" fill="#1f2937" stroke="#111827" stroke-width="2"/>
  <!-- Dice -->
  <rect x="80" y="95" width="20" height="20" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="85" cy="100" r="2" fill="#1f2937"/>
  <circle cx="95" cy="100" r="2" fill="#1f2937"/>
  <circle cx="85" cy="110" r="2" fill="#1f2937"/>
  <circle cx="95" cy="110" r="2" fill="#1f2937"/>
  <rect x="105" y="95" width="20" height="20" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="115" cy="100" r="2" fill="#1f2937"/>
  <circle cx="115" cy="105" r="2" fill="#1f2937"/>
  <circle cx="115" cy="110" r="2" fill="#1f2937"/>
