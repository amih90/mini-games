<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg-reversi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-reversi)"/>
  <!-- Board -->
  <rect x="40" y="40" width="120" height="120" fill="#047857" rx="4"/>
  <!-- Grid lines -->
  <line x1="70" y1="40" x2="70" y2="160" stroke="#065f46" stroke-width="1"/>
  <line x1="100" y1="40" x2="100" y2="160" stroke="#065f46" stroke-width="1"/>
  <line x1="130" y1="40" x2="130" y2="160" stroke="#065f46" stroke-width="1"/>
  <line x1="40" y1="70" x2="160" y2="70" stroke="#065f46" stroke-width="1"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#065f46" stroke-width="1"/>
  <line x1="40" y1="130" x2="160" y2="130" stroke="#065f46" stroke-width="1"/>
  <!-- Black pieces -->
  <circle cx="85" cy="85" r="12" fill="#1f2937" stroke="#111827" stroke-width="2"/>
  <circle cx="115" cy="115" r="12" fill="#1f2937" stroke="#111827" stroke-width="2"/>
  <!-- White pieces -->
  <circle cx="85" cy="115" r="12" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="115" cy="85" r="12" fill="white" stroke="#e5e7eb" stroke-width="2"/>
</svg>
