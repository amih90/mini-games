name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}

      - name: Verify build output
        run: |
          test -d out || { echo "::error::Build output directory 'out' not found"; exit 1; }
          test -f out/index.html || { echo "::error::index.html missing from build output"; exit 1; }
          PAGE_COUNT=$(find out -name '*.html' | wc -l)
          echo "Generated $PAGE_COUNT HTML pages"
          test "$PAGE_COUNT" -gt 10 || { echo "::error::Too few pages ($PAGE_COUNT), expected more than 10"; exit 1; }

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
